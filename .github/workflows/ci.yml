name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: otpguard_test
          POSTGRES_USER: otpguard
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements-test.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements-test.txt

      - name: Run migrations
        working-directory: backend
        env:
          FLASK_ENV: testing
          DATABASE_URL: postgresql://otpguard:test_password@localhost:5432/otpguard_test
          SECRET_KEY: ci-secret-key
          JWT_SECRET_KEY: ci-jwt-secret
        run: alembic upgrade head

      - name: Run tests with coverage
        working-directory: backend
        env:
          FLASK_ENV: testing
          DATABASE_URL: postgresql://otpguard:test_password@localhost:5432/otpguard_test
          SECRET_KEY: ci-secret-key
          JWT_SECRET_KEY: ci-jwt-secret
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing -q

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  lint-backend:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install linters
        run: pip install flake8 bandit
      - name: flake8
        working-directory: backend
        run: flake8 app --max-line-length=120 --exclude=__pycache__
      - name: bandit security scan
        working-directory: backend
        run: bandit -r app -ll -q

  test-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: otpguard-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: otpguard-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
